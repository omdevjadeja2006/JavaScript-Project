<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TaskFlow - Login</title>
    <link rel="stylesheet" href="Login.css">
    <link rel="icon" type="image/x-icon" href="images/download.jpg">
</head>
<body>
    <div class="page-wrapper">   
        <div class="header">   
            <h1 class="logo">TaskFlow</h1>
            <nav class="nav-container">
                <a href="homepage.php" class="na">Home</a>
                <a href="signin.html" class="na">Sign-in</a>
                <a href="contact.html" class="na">Support</a>
            </nav>
        </div>

        <div class="main-container">  
            <div class="formbox landing-anim"> 
                <form action="login_process.php" method="POST">
                    <label id="heading">Log-in</label><br><br>
                    
                    <input type="text" name="username" class="data" placeholder="Username" id="username" required autocomplete="username">
                    <span id="user-error" style="color: #ff5f5f; font-size: 0.8rem; display: block; margin-top: -10px; margin-bottom: 10px; text-align: left;"></span>
                    
                    <input type="password" name="password" class="data" placeholder="Password" id="password" required autocomplete="current-password">
                    <span id="pass-error" style="color: #ff5f5f; font-size: 0.8rem; display: block; margin-top: -10px; margin-bottom: 10px; text-align: left;"></span>
                    
                    <input type="submit" value="Log-in" class="btn">
                </form>
            </div>
        </div>    
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');

            if (error === 'nouser') {
                document.getElementById('user-error').innerText = "No such user exists.";
            } else if (error === 'wrongpass') {
                document.getElementById('pass-error').innerText = "Incorrect password.";
            }
        };
    </script>
</body>
</html>
