<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TaskFlow - Sign-up</title>
    <link rel="stylesheet" href="signin2.css">
    <link rel="icon" type="image/x-icon" href="images/download.png">
</head>
<body>
    <div class="page">   
        <div class="header">   
            <h1 class="logo">TaskFlow</h1>
            <nav class="nav-container">
                <a href="homepage.php" class="na">Home</a>
                <a href="Login.html" class="na">Log-in</a>
                <a href="contact.html" class="na">Support</a>
            </nav>
        </div>

        <div class="container">  
            <div class="formbox landing-anim"> 
                <form action="submit_xyz.php" method="post">
                    <label id="heading">Sign-up</label><br><br>
                    
                    <input type="email" class="data" name="email" placeholder="E-mail" id="email" required>
                    <span id="email-error" style="color: #ff5f5f; font-size: 0.8rem; display: block; margin-top: 5px; text-align: left;"></span>
                    <br>
                    
                    <input type="text" class="data" name="username" placeholder="Username" id="username" required><br><br>

                    <input type="password" class="data" name="password" placeholder="Password" id="password" required><br><br>

                    <input type="password" class="data" name="confirm_password" placeholder="Confirm Password" id="confirm_password" required><br><br><br>
                    
                    <input type="submit" value="Sign-up" class="btn">
                </form>
            </div>
        </div>    
    </div>

   <script>
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        
        // Find the email error span you added earlier
        const emailError = document.getElementById('email-error');

        if (error === 'exists') {
            emailError.innerText = "This email or username is already taken.";
        } else if (error === 'passmatch') {
            // You can target a specific span under the confirm password box
            alert("Passwords do not match!"); 
        }
    };
</script>
</body>
</html>
